##############################################################################
# tas-example-gha-raw-dispatch.yml
#
# Example GitHub Actions workflow showing how to integrate the
# Test Automation Service via direct GitHub REST API call (no Python required).
#
# The API call is always fire-and-forget: returns 204 immediately.
# No test outputs (passed/failed counts) are available back to the caller.
# The run can be tracked via the run name: tas-<CORRELATION_ID>
#
# Copy this file to .github/workflows/ in your repository and configure
# the INTEGRATION_TEST_PAT secret (GitHub PAT with scope: public_repo, actions:read).
##############################################################################

name: Build & Deploy (raw dispatch)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "TAS repo branch/tag"
        type: string
        default: main

env:
  TAS_REPO: pagopa/pagopa-platform-integration-test
  # Falls back to 'main' when the workflow is triggered by 'push' (no inputs).
  TAS_REF: ${{ inputs.ref || 'main' }}

jobs:

  # ── 1. Dispatch integration tests via GitHub REST API ─────────────────────
  trigger-tests:
    name: "Trigger integration tests"
    runs-on: ubuntu-latest
    outputs:
      correlation_id: ${{ steps.dispatch.outputs.correlation_id }}
    steps:
      - name: Dispatch workflow via GitHub API
        id: dispatch
        run: |
          CORRELATION_ID="${{ github.run_id }}-${{ github.run_attempt }}"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INTEGRATION_TEST_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TAS_REPO}/actions/workflows/test-automation-service.yml/dispatches" \
            -d "{
              \"ref\": \"${TAS_REF}\",
              \"inputs\": {
                \"test_type\": \"integration\",
                \"test_suite\": \"tas_pass\",
                \"environment\": \"uat\",
                \"caller_id\": \"${{ github.repository }}\",
                \"correlation_id\": \"$CORRELATION_ID\"
              }
            }")

          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::error::Dispatch failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "correlation_id=$CORRELATION_ID" >> "$GITHUB_OUTPUT"

      - name: Print monitoring info
        run: |
          echo "Tests dispatched — pipeline continues immediately."
          echo "Run name       : tas-${{ steps.dispatch.outputs.correlation_id }}"
          echo "Correlation ID : ${{ steps.dispatch.outputs.correlation_id }}"
          echo "Monitor at     : https://github.com/${TAS_REPO}/actions"

  # ── 2. Deploy: runs in parallel with the tests ────────────────────────────
  deploy:
    name: "Deploy"
    needs: trigger-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "Deploying — tests are running asynchronously."
          echo "Correlation ID: ${{ needs.trigger-tests.outputs.correlation_id }}"
          # ./deploy.sh
