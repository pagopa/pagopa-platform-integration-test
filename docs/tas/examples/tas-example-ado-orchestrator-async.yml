##############################################################################
# tas-example-ado-orchestrator-async.yml
#
# Example Azure DevOps pipeline showing how to integrate the
# Test Automation Service via tas_orchestrator.py in asynchronous mode.
#
# The orchestrator fires the test run and exits immediately (exit 0).
# The pipeline continues without waiting for the test outcome.
# The CORRELATION_ID is captured as a pipeline variable for tracking.
#
# Copy this file to your repository and configure the following
# secret variable in the pipeline or variable group:
#   - INTEGRATION_TEST_PAT: GitHub PAT with scope public_repo, actions:read
##############################################################################

trigger: none
pr: none

parameters:
  - name: suite
    displayName: "Test suite"
    type: string
    default: tas_pass
  - name: environment
    displayName: "Target environment"
    type: string
    default: uat
    values:
      - dev
      - uat
  - name: ref
    displayName: "TAS repo branch/tag"
    type: string
    default: main
  - name: tags
    displayName: "Behave tag expression (e.g. @runnable, @e2e)"
    type: string
    default: "@runnable"
  - name: verifyOrchestrator
    displayName: "Verify orchestrator SHA-256 (recommended)"
    type: boolean
    default: true

variables:
  # Import the variable group that holds INTEGRATION_TEST_PAT (secret).
  # NOTE: using the sequence syntax ('- name:' / '- group:') is REQUIRED to
  # reference a variable group — the mapping syntax ('KEY: value') does not
  # support 'group:' and would leave $(INTEGRATION_TEST_PAT) unresolved,
  # causing GitHub to return HTTP 401 (Bad credentials) on dispatch.
  - group: tas-integration-secrets
  - name: PYTHON_VERSION
    value: "3.11"
  - name: TAS_REPO
    value: "pagopa/pagopa-platform-integration-test"
  # ── Supply-chain integrity ───────────────────────────────────────────────
  # Leave empty to verify against the sidecar published on the same ref
  # (scripts/tas_orchestrator.py.sha256). Set to an explicit hex digest to
  # pin the script (true SRI: survives tampering of the ref tip). Compute
  # the digest once with:
  #   curl -sSfL https://raw.githubusercontent.com/$(TAS_REPO)/${{ parameters.ref }}/scripts/tas_orchestrator.py | sha256sum
  - name: TAS_ORCHESTRATOR_SHA256
    value: ""

stages:

  # ── Stage 1: Dispatch integration tests (fire-and-forget) ─────────────────
  - stage: TriggerTests
    displayName: "Trigger Integration Tests"
    jobs:
      - job: FireAndForget
        displayName: "Dispatch tests and continue"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(PYTHON_VERSION)"
            displayName: "Setup Python $(PYTHON_VERSION)"

          - script: pip install requests
            displayName: "Install orchestrator dependencies"

          - script: |
              curl -sSfL \
                "https://raw.githubusercontent.com/$(TAS_REPO)/${{ parameters.ref }}/scripts/tas_orchestrator.py" \
                -o tas_orchestrator.py
            displayName: "Download tas_orchestrator.py"

          # Verify the script's SHA-256 before executing it.
          # Pinned digest (TAS_ORCHESTRATOR_SHA256) wins; otherwise the
          # sidecar published on the same ref is used.
          # Skipped entirely when 'verifyOrchestrator' is set to false.
          - ${{ if eq(parameters.verifyOrchestrator, true) }}:
            - script: |
                set -euo pipefail
                if [ -n "$(TAS_ORCHESTRATOR_SHA256)" ]; then
                  echo "Verifying against pinned SHA-256..."
                  echo "$(TAS_ORCHESTRATOR_SHA256)  tas_orchestrator.py" | sha256sum -c -
                else
                  echo "Verifying against published sidecar..."
                  curl -sSfL \
                    "https://raw.githubusercontent.com/$(TAS_REPO)/${{ parameters.ref }}/scripts/tas_orchestrator.py.sha256" \
                    -o tas_orchestrator.py.sha256
                  sha256sum -c tas_orchestrator.py.sha256
                fi
              displayName: "Verify tas_orchestrator.py SHA-256"

          - script: |
              # Fail the step if any command in the pipe fails (otherwise `tee`
              # would always exit 0 and hide dispatch errors from tas_orchestrator.py)
              set -euo pipefail

              # Run async: script exits immediately with 0 and prints:
              #   CORRELATION_ID=<uuid>
              #   RUN_NAME=tas-<uuid>
              python tas_orchestrator.py \
                --type integration \
                --suite "${{ parameters.suite }}" \
                --env "${{ parameters.environment }}" \
                --ref "${{ parameters.ref }}" \
                --caller-id "$(Build.Repository.Name)/$(Build.BuildId)" \
                --correlation-id "$(Build.BuildId)-$(System.JobAttempt)" \
                --tags "${{ parameters.tags }}" \
                | tee orchestrator_output.txt

              # Capture CORRELATION_ID and expose it as a pipeline variable
              CORRELATION_ID=$(grep '^CORRELATION_ID=' orchestrator_output.txt | cut -d= -f2)
              if [ -z "$CORRELATION_ID" ]; then
                echo "##[error]CORRELATION_ID not found in orchestrator output"
                exit 1
              fi
              echo "##vso[task.setvariable variable=CORRELATION_ID;isOutput=true]$CORRELATION_ID"
              echo "Correlation ID: $CORRELATION_ID"
              echo "Monitor at: https://github.com/$(TAS_REPO)/actions"
            displayName: "Dispatch tests (fire-and-forget)"
            name: trigger
            env:
              GITHUB_TOKEN: $(INTEGRATION_TEST_PAT)

  # ── Stage 2: Deploy ───────────────────────────────────────────────────────
  # NOTE: runs after the dispatch stage (sequentially), but does NOT wait for
  # the test outcome — the tests keep running on GitHub Actions in background.
  # `succeeded()` here only guarantees that the dispatch itself was sent OK.
  - stage: Deploy
    displayName: "Deploy"
    dependsOn: TriggerTests
    condition: succeeded()
    jobs:
      - job: DeployApp
        displayName: "Deploy application"
        pool:
          vmImage: ubuntu-latest
        variables:
          CORRELATION_ID: $[ stageDependencies.TriggerTests.FireAndForget.outputs['trigger.CORRELATION_ID'] ]
        steps:
          - script: |
              echo "Deploying — tests are running asynchronously."
              echo "Correlation ID: $(CORRELATION_ID)"
            displayName: "Deploy step"
