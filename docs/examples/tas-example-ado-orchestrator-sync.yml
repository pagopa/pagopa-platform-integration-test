##############################################################################
# tas-example-ado-orchestrator-sync.yml
#
# Example Azure DevOps pipeline showing how to integrate the
# Test Automation Service via tas_orchestrator.py in synchronous mode.
#
# Copy this file to your repository and configure the following
# secret variable in the pipeline or variable group:
#   - INTEGRATION_TEST_PAT: GitHub PAT with scope public_repo, actions:read
##############################################################################

trigger: none

parameters:
  - name: suite
    displayName: "Test suite"
    type: string
    default: wisp
    values:
      - wisp
      - all
  - name: environment
    displayName: "Target environment"
    type: string
    default: uat
    values:
      - dev
      - uat

variables:
  PYTHON_VERSION: "3.11"
  TAS_REPO: "pagopa/pagopa-platform-integration-test"
  TAS_REF: "main"

stages:

  # ── Stage 1: Integration tests ────────────────────────────────────────────
  - stage: IntegrationTests
    displayName: "Integration Tests"
    jobs:
      - job: RunTests
        displayName: "Trigger & wait for test results"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(PYTHON_VERSION)"
            displayName: "Setup Python $(PYTHON_VERSION)"

          - script: pip install requests
            displayName: "Install orchestrator dependencies"

          - script: |
              curl -sSfL \
                "https://raw.githubusercontent.com/$(TAS_REPO)/$(TAS_REF)/scripts/tas_orchestrator.py" \
                -o tas_orchestrator.py
            displayName: "Download tas_orchestrator.py"

          # Exit 0 = all tests passed   → stage succeeds → deploy runs
          # Exit 1 = scenarios failed   → stage fails    → deploy skipped
          # Exit 2 = orchestration error (missing token, timeout, API error)
          - script: |
              python tas_orchestrator.py \
                --suite "${{ parameters.suite }}" \
                --env "${{ parameters.environment }}" \
                --caller-id "$(Build.Repository.Name)/$(Build.BuildId)" \
                --correlation-id "$(Build.BuildId)-$(System.JobAttempt)" \
                --sync
            displayName: "Run integration tests (sync)"
            env:
              GITHUB_TOKEN: $(INTEGRATION_TEST_PAT)

  # ── Stage 2: Deploy (runs only if IntegrationTests succeeded) ────────────
  - stage: Deploy
    displayName: "Deploy"
    dependsOn: IntegrationTests
    condition: succeeded()
    jobs:
      - job: DeployApp
        displayName: "Deploy application"
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: echo "All tests passed — deploying..."
            displayName: "Deploy step"
