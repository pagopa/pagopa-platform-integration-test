name: Create Confluence Report Page

on:
    workflow_call:
        inputs:
            run_type:
                description: "Type of run"
                type: string
                required: true
                default: NO-PROMO
                

permissions:
    contents: read

jobs:
    create_report_page:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout gh-pages branch (reports)
              uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
              with:
                ref: gh-pages
                path: public


            - name: Setup Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: 3.x

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install requests dynaconf

            - name: Create Confluence Report Page
              env:
                  CONFLUENCE_KEY: ${{ secrets.CONFLUENCE_KEY }}
                  CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
              run: |
                  python3 .github/scripts/create_report_page.py --run-type "${{ inputs.run_type }}"
