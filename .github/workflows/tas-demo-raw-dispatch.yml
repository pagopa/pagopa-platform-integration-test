##############################################################################
# TAS DEMO — raw workflow_dispatch via GitHub API (Option 4)
#
# Demonstrates how to trigger the Test Automation Service by calling the
# GitHub REST API directly with curl — no Python orchestrator required.
#
# This is always fire-and-forget: the API call returns 204 immediately.
# There is no way to receive test outputs (passed/failed counts) back.
# The run can be tracked via the CORRELATION_ID in the run name: tas-<id>
#
# Can be triggered manually from the GitHub UI
# (Actions → "TAS Demo — raw dispatch").
#
# Prerequisites:
#   - INTEGRATION_TEST_PAT secret configured in this repository.
#     (workflow_dispatch via API cannot use the built-in GITHUB_TOKEN
#      to trigger another workflow in the same repo.)
##############################################################################

name: ↔️ TAS Demo — raw dispatch

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Test suite to run"
        required: true
        type: choice
        options:
          - wisp
          - all
        default: wisp
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
        default: uat
      ref:
        description: "TAS repo branch/tag to run the workflow on (defaults to the current branch)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:

  # ── 1. Dispatch tests via GitHub REST API ─────────────────────────────────
  trigger-tests:
    name: "Dispatch tests (raw API)"
    runs-on: ubuntu-latest
    outputs:
      correlation_id: ${{ steps.dispatch.outputs.correlation_id }}
    steps:
      - name: Build correlation ID
        id: correlation
        run: |
          CORRELATION_ID="${{ github.run_id }}-${{ github.run_attempt }}"
          echo "correlation_id=$CORRELATION_ID" >> "$GITHUB_OUTPUT"

      - name: Dispatch workflow via GitHub API
        id: dispatch
        run: |
          CORRELATION_ID="${{ steps.correlation.outputs.correlation_id }}"
          TAS_REF="${{ inputs.ref || github.ref_name }}"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INTEGRATION_TEST_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/pagopa/pagopa-platform-integration-test/actions/workflows/test-automation-service.yml/dispatches" \
            -d "{
              \"ref\": \"$TAS_REF\",
              \"inputs\": {
                \"test_suite\": \"${{ inputs.test_suite }}\",
                \"environment\": \"${{ inputs.environment }}\",
                \"caller_id\": \"${{ github.repository }}\",
                \"correlation_id\": \"$CORRELATION_ID\"
              }
            }")

          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::error::Dispatch failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "correlation_id=$CORRELATION_ID" >> "$GITHUB_OUTPUT"

      - name: Print monitoring info
        run: |
          echo "Tests dispatched successfully (fire-and-forget)."
          echo "Run name       : tas-${{ steps.dispatch.outputs.correlation_id }}"
          echo "Correlation ID : ${{ steps.dispatch.outputs.correlation_id }}"
          echo "Monitor at     : https://github.com/pagopa/pagopa-platform-integration-test/actions"

  # ── 2. Next step runs immediately, in parallel with the tests ─────────────
  next-step:
    name: "Continue pipeline (parallel)"
    needs: trigger-tests
    runs-on: ubuntu-latest
    steps:
      - name: Do other work
        run: |
          echo "Pipeline continues while tests run asynchronously."
          echo "Correlation ID passed downstream: ${{ needs.trigger-tests.outputs.correlation_id }}"
