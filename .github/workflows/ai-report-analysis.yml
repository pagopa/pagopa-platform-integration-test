name: 🤖 AI Report Analysis

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt to send to the AI model'
        required: false
        default: 'di che colore era il cavallo bianco di napoleone?'
      prompt_artifact:
        description: 'Artifact name containing prompt.txt (optional, overrides prompt)'
        required: false
        default: ''
      analysis_artifact_name:
        description: 'Name of the output artifact containing response.json and analysis.md'
        required: false
        default: ''
      max_tokens:
        description: 'Max output tokens'
        required: false
        default: '32'
  workflow_call:
    inputs:
      prompt:
        description: 'Prompt string (ignored if prompt_artifact is provided)'
        required: false
        type: string
        default: ''
      prompt_artifact:
        description: 'Name of an artifact containing prompt.txt to use as prompt'
        required: false
        type: string
        default: ''
      analysis_artifact_name:
        description: 'Name of the artifact to upload with the model response'
        required: false
        type: string
        default: ''
      max_tokens:
        description: 'Max output tokens'
        required: false
        type: string
        default: '32'

permissions:
  contents: read
  actions: write

env:
  BASE_URL: "https://models.github.ai"
  MODEL: "openai/gpt-4.1"

jobs:
  check-model-catalog:
    name: "Verify model in catalog"
    runs-on: ubuntu-latest
    outputs:
      model_found: ${{ steps.check.outputs.model_found }}
    steps:
      - name: Check model availability in catalog
        id: check
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN_GITHUB_MODELS }}
        run: |
          echo "Calling GET $BASE_URL/catalog/models ..."
          RESPONSE=$(curl -s -f -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$BASE_URL/catalog/models")

          FOUND=$(echo "$RESPONSE" | jq -r --arg model "$MODEL" \
            'map(select(.id == $model)) | length > 0')

          if [ "$FOUND" = "true" ]; then
            echo "OK - Model '$MODEL' found in catalog"
            echo "model_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "KO - Model '$MODEL' NOT found in catalog"
            echo "model_found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  call-inference:
    name: "Call inference endpoint"
    needs: check-model-catalog
    runs-on: ubuntu-latest
    steps:
      - name: Download prompt artifact
        if: ${{ inputs.prompt_artifact != '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.prompt_artifact }}
          path: ai-prompt-input

      - name: Resolve prompt
        env:
          INPUT_PROMPT: ${{ inputs.prompt }}
          PROMPT_ARTIFACT: ${{ inputs.prompt_artifact }}
        run: |
          mkdir -p ai-analysis-output
          if [ -n "$PROMPT_ARTIFACT" ] && [ -f "ai-prompt-input/prompt.txt" ]; then
            echo "Using prompt from artifact '$PROMPT_ARTIFACT'"
            cp ai-prompt-input/prompt.txt ai-analysis-output/prompt.txt
          elif [ -n "$INPUT_PROMPT" ]; then
            echo "Using prompt from input"
            printf '%s' "$INPUT_PROMPT" > ai-analysis-output/prompt.txt
          else
            echo "Using default prompt"
            printf '%s' "di che colore era il cavallo bianco di napoleone?" > ai-analysis-output/prompt.txt
          fi
          echo "Prompt size (chars): $(wc -c < ai-analysis-output/prompt.txt)"

      - name: Call chat completions
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN_GITHUB_MODELS }}
          MAX_TOKENS: ${{ inputs.max_tokens || '32' }}
        run: |
          PROMPT_CONTENT=$(cat ai-analysis-output/prompt.txt)
          BODY=$(jq -n \
            --arg model "$MODEL" \
            --arg content "$PROMPT_CONTENT" \
            --argjson max_tokens "$MAX_TOKENS" \
            '{"model":$model,"messages":[{"role":"user","content":$content}],"max_tokens":$max_tokens}')

          echo "Calling POST $BASE_URL/inference/chat/completions ..."
          RESPONSE=$(curl -s -f -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$BASE_URL/inference/chat/completions")

          echo "$RESPONSE" > ai-analysis-output/response.json
          echo "$RESPONSE" | jq -r '.choices[0].message.content // ""' > ai-analysis-output/analysis.md

          echo "--- Response metadata ---"
          echo "$RESPONSE" | jq '{model, usage, finish_reason: .choices[0].finish_reason}'
          echo "--- Analysis content ---"
          cat ai-analysis-output/analysis.md

      - name: Upload analysis artifact
        if: ${{ inputs.analysis_artifact_name != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.analysis_artifact_name }}
          path: ai-analysis-output
