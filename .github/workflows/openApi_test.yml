name: Fetch openApi files from github and then test them with schemathesis

on:
  schedule:
    - cron: '0 1 * * *' # Runs every day at 1 AM
  workflow_dispatch:
 

permissions:
    contents: read

jobs:
  fetch_and_test_openapi:
    runs-on: ubuntu-latest
    strategy:
       matrix:
        env: [ "dev", "uat" ]
    
    steps:
    - name: Set up Python
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
      with: 
        python-version: '3.x'

    -  name: Install dependencies
       run: |
          python -m pip install --upgrade pip
          pip install requests schemathesis
      
       if: matrix.env == 'dev'
    -  name: Fetch and test openApi dev
       env:
          TARGET_ENV: ${{ matrix.env }}
          suite: 'fdr'
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_DEV_URL }}
       run: |
          python -u .github/scripts/openApi_test.py

       if: matrix.env == 'uat'
    -  name: Fetch and test openApi uat
       env:
          TARGET_ENV: ${{ matrix.env }}
          suite: 'fdr'
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_UAT_URL }}
       run: |
          python -u .github/scripts/openApi_test.py


     
    