name: Main Dispatch Integration Tests

on:
  schedule:
    - cron: '17 6 * * *'
    
  workflow_dispatch:
    inputs:
      services:
        description: "Select which services to test"
        required: true
        type: choice
        default: all
        options:
          - wisp
          - checkout
          - openapi-fdr
          # - fdr
          - all

jobs:
  trigger_wisp:
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.services == 'wisp' || github.event.inputs.services == 'all'
    uses: ./.github/workflows/wisp-tests.yml
    secrets: inherit

  trigger_checkout_e2e:
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.services == 'checkout' || github.event.inputs.services == 'all'
    uses: ./.github/workflows/checkout-e2e-tests.yml
    secrets: inherit

  # trigger_fdr:
  #   if: |
  #     github.event_name == 'schedule' ||
  #     github.event.inputs.services == 'fdr' || github.event.inputs.services == 'all'
  #   uses: ./.github/workflows/fdr-tests.yml
  #   secrets: inherit

  trigger_openapi_fdr:
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.services == 'openapi-fdr' || github.event.inputs.services == 'all'
    uses: ./.github/workflows/openapi-fdr-tests.yml
    secrets: inherit

  deploy:
    if: always()
    needs: [trigger_wisp, trigger_checkout_e2e, trigger_openapi_fdr] #, trigger_fdr]
    uses: ./.github/workflows/deploy-test-report.yml
    secrets: inherit

  create_confluence_report:
    needs: [deploy]
    uses: ./.github/workflows/create_report_page.yml
    secrets: inherit
    with:
      run_type: ${{ case(github.event_name == 'schedule',  'NIGHTLY', 'NO-PROMO') }}
