##############################################################################
# TAS DEMO — tas_orchestrator.py --sync (Option 2)
#
# Demonstrative workflow showing how a calling system integrates the
# Test Automation Service via the Python CLI bridge in synchronous mode.
#
# Can be triggered manually from the GitHub UI
# (Actions → "TAS Demo — orchestrator sync").
#
# The orchestrator script is run directly from the scripts/ folder
# (same repo checkout). In a real calling repository it is downloaded
# via curl from raw.githubusercontent.com — see docs/examples/tas-example-gha-orchestrator-sync.yml.
#
# Prerequisites:
#   - INTEGRATION_TEST_PAT secret configured in this repository.
#     (workflow_dispatch via API cannot use the built-in GITHUB_TOKEN
#      to trigger another workflow in the same repo.)
##############################################################################

name: ↔️ TAS Demo — orchestrator sync

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test category"
        required: true
        type: choice
        options:
          - integration
          - e2e
          - api
        default: integration
      test_suite:
        description: "Test suite to run"
        required: true
        type: string
        default: tas_pass
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
        default: uat
      ref:
        description: "TAS repo branch/tag to run the workflow on (defaults to the current branch)"
        required: false
        type: string
        default: ""
      verify_orchestrator:
        description: "Verify orchestrator SHA-256 against the published sidecar (recommended)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:

  # ── 1. Run integration tests via orchestrator (sync) ──────────────────────
  integration-tests:
    name: "Integration Tests (${{ inputs.test_suite }} / ${{ inputs.environment }})"
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.run.outputs.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        run: pip install requests

      # Even though the script is executed from the local checkout (no download
      # step here), we verify it against its published sidecar to mirror the
      # supply-chain check performed by real callers in the example workflows.
      # Skipped entirely when 'verify_orchestrator' is set to false.
      - name: Verify tas_orchestrator.py SHA-256
        if: ${{ inputs.verify_orchestrator != false }}
        run: |
          set -euo pipefail
          cd scripts
          echo "Verifying tas_orchestrator.py against published sidecar..."
          sha256sum -c tas_orchestrator.py.sha256

      # Exit 0 = all tests passed   → job succeeds → deploy runs
      # Exit 1 = scenarios failed   → job fails    → deploy skipped
      # Exit 2 = orchestration error (missing token, timeout, API error)
      - name: Run integration tests (sync)
        id: run
        run: |
          python scripts/tas_orchestrator.py \
            --type "${{ inputs.test_type }}" \
            --suite "${{ inputs.test_suite }}" \
            --env "${{ inputs.environment }}" \
            --caller-id "${{ github.repository }} (demo)" \
            --correlation-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --ref "${{ inputs.ref || github.ref_name }}" \
            --sync
        env:
          GITHUB_TOKEN: ${{ secrets.INTEGRATION_TEST_PAT }}

  # ── 2. Deploy (runs only if tests passed) ─────────────────────────────────
  deploy:
    name: "Deploy (simulated)"
    needs: integration-tests
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Simulate deploy
        run: echo "All tests passed — deploy would proceed here."
