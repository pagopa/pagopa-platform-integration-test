<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>🤖 AI Analysis · {{ suite_label }} · {{ timestamp }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background-color: #f5f8fa; padding: 2rem; }
    .hero {
      background-color: #6f42c1;
      color: white;
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
      border-radius: 0.5rem;
    }
    .content-card {
      background: white;
      border-radius: 0.5rem;
      padding: 2rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
    .content-card h2 { margin-top: 1.5rem; color: #6f42c1; }
    .content-card h3 { color: #495057; }
    .content-card pre {
      background: #f1f3f5;
      padding: 0.75rem;
      border-radius: 0.35rem;
      overflow-x: auto;
      font-size: 0.9rem;
    }
    .hero code {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      padding: 0.15rem 0.4rem;
      border-radius: 0.35rem;
    }
    .content-card code {
      color: #ff61b0;
      background: #fff0f7;
      padding: 0.1rem 0.3rem;
      border-radius: 0.25rem;
    }
    footer code {
      color: #6f42c1;
      background: #f3ebff;
      padding: 0.1rem 0.3rem;
      border-radius: 0.25rem;
    }
    .btn-secondary { background-color: #6c757d; border: none; }
    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.8rem;
      color: #6c757d;
    }
  </style>
</head>
<body>

<header class="hero">
  <h1 class="display-6">🤖 AI Analysis · {{ suite_label }}</h1>
  <p class="lead mb-1">Run: <code>{{ timestamp }}</code></p>
  <div class="mt-3">
    <a href="../index.html" class="btn btn-light">📊 View Report</a>
    <a href="../../index.html" class="btn btn-light">🗂️ Storico</a>
    <a href="../../../index.html" class="btn btn-light">🏠 Dashboard</a>
  </div>
</header>

<div class="container">
  <div class="content-card">
    <div id="analysis-content">
      <div class="text-center text-muted">Rendering in corso...</div>
    </div>
  </div>
</div>

<footer>
  <p>Powered by GitHub Models · Model: <code>{{ model }}</code></p>
</footer>

<script>
  const markdown = {{ analysis_markdown_json }};
  const target = document.getElementById('analysis-content');
  if (markdown && markdown.trim().length > 0) {
    target.innerHTML = marked.parse(markdown);
  } else {
    target.innerHTML = '<div class="alert alert-warning">Nessuna analisi disponibile per questa run.</div>';
  }
</script>

</body>
</html>
